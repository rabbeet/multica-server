# tinyproxy.conf — egress allowlist for multica brainstorm container.
#
# Only the explicit FilterDomain entries below are allowed outbound.
# Everything else gets HTTP 403.
#
# Layered with L1 (filesystem :ro mounts) + L3 (claude settings deny rules).
# This is the L2 layer.

User tinyproxy
Group tinyproxy

# Bind on container's network interface
Listen 0.0.0.0
Port 8888

# Logging — diagnose blocked requests via `docker logs tinyproxy`
LogLevel Info
LogFile "/var/log/tinyproxy/tinyproxy.log"

# Don't allow PUT/POST/etc beyond CONNECT for HTTPS
DisableViaHeader Yes

# Standard timeout
Timeout 600

# Default error page text
DefaultErrorFile "/usr/share/tinyproxy/default.html"

# ----------------------------------------------------------------------------
# Allowlist — domains the container can reach.
# Filter is applied to BOTH the host header and the connect target.
# Lines that start with # are comments; literal hostnames or wildcard *.domain
# ----------------------------------------------------------------------------
Filter "/etc/tinyproxy/filter.txt"
FilterDefaultDeny Yes
FilterURLs No
FilterExtended Yes

# Allow CONNECT to standard TLS ports — but Filter still applies to the
# destination hostname.
ConnectPort 443
ConnectPort 80

# Allow access to host's services (postgres, redis on host.docker.internal)
# These resolve to the docker bridge gateway.
# tinyproxy itself does NOT proxy raw TCP — only HTTP and HTTPS via CONNECT.
# Postgres/Redis traffic goes DIRECTLY (no proxy) — those are explicitly excluded
# from $HTTP_PROXY via NO_PROXY env var in compose.

# ----------------------------------------------------------------------------
# Stats — for `99-verify.sh` and debugging
# ----------------------------------------------------------------------------
StatHost "tinyproxy.stats"
