name: Smoke — claude-code-action permissions

# Ported from rabbeet/Pulse @ 74cf64d5 (PUL-235 S1, 2026-05-23). Originally
# Pulse PUL-49: catches missing id-token / contents / pull-requests
# permissions and missing allowed_bots on claude-code-action workflows
# BEFORE they ship. Drift surfaces weeks later as fix-loops that never close.
#
# multica-server-specific deltas vs Pulse source:
#   - sentry-autofix.yml is NOT in validated list. PUL-235 Q2 = drop.
#   - code-review.yml / code-review-fix.yml / ci-autofix.yml / pr-test-
#     autofix.yml don't exist yet at S1 land time. The validator skips
#     missing files (`continue`) so the smoke is a no-op until S2 and S4
#     land — but the scaffold is in place so S2/S4 PRs don't need to also
#     wire up the smoke.
#
# Triggered on: workflow_dispatch (manual), pull_request that touches any
# workflow YAML, weekly schedule.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
  schedule:
    - cron: '17 6 * * 1'  # Monday 06:17 UTC, weekly

jobs:
  validate-permissions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify each claude-action job has required permissions
        run: |
          set -euo pipefail
          MISSING=()
          for f in .github/workflows/code-review.yml \
                   .github/workflows/code-review-fix.yml \
                   .github/workflows/ci-autofix.yml \
                   .github/workflows/pr-test-autofix.yml; do
            if [ ! -f "$f" ]; then continue; fi
            JOBS=$(yq '.jobs | to_entries | .[] | select(.value.steps[]?.uses // "" | test("anthropics/claude-code-action")) | .key' "$f")
            for j in $JOBS; do
              JOB_PERMS=$(yq ".jobs.\"$j\".permissions // null" "$f")
              WF_PERMS=$(yq '.permissions // null' "$f")
              for ATTR in 'id-token' 'contents' 'pull-requests'; do
                JOB_VAL=$(echo "$JOB_PERMS" | yq ".\"$ATTR\" // null" -)
                WF_VAL=$(echo "$WF_PERMS"  | yq ".\"$ATTR\" // null" -)
                EFFECTIVE="$JOB_VAL"
                if [ "$EFFECTIVE" = "null" ] || [ -z "$EFFECTIVE" ]; then
                  EFFECTIVE="$WF_VAL"
                fi
                if [ "$EFFECTIVE" = "null" ] || [ -z "$EFFECTIVE" ]; then
                  MISSING+=("$f::$j missing permissions.$ATTR (job=$JOB_VAL, workflow=$WF_VAL)")
                fi
              done
              ON_KEYS=$(yq '.on | keys | .[]' "$f")
              PR_TYPES=$(yq '.on.pull_request.types // [] | .[]' "$f" 2>/dev/null || echo '')
              NEEDS_ALLOWED_BOTS='false'
              if echo "$ON_KEYS" | grep -qE '^workflow_run$'; then
                NEEDS_ALLOWED_BOTS='true'
              fi
              if echo "$PR_TYPES" | grep -qE '^labeled$'; then
                NEEDS_ALLOWED_BOTS='true'
              fi
              if [ "$NEEDS_ALLOWED_BOTS" = 'true' ]; then
                ALLOWED_BOTS=$(yq ".jobs.\"$j\".steps[] | select(.uses // \"\" | test(\"anthropics/claude-code-action\")) | .with.allowed_bots // \"\"" "$f")
                if [ -z "$ALLOWED_BOTS" ] || [ "$ALLOWED_BOTS" = '""' ]; then
                  MISSING+=("$f::$j missing allowed_bots (bot-initiated trigger)")
                fi
              fi
            done
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required permissions on claude-action workflows:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All claude-action jobs have required permissions and (where applicable) allowed_bots."
