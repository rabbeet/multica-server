name: CI Autofix

# Ported from rabbeet/multica (M4 ci-autofix @ ce402af9) for the multica-
# server side of PUL-235 (S4). Runs after CI on main fails — Claude diagnoses
# the failure, opens ci-autofix-<ts> PR with the fix, auto-merges when CI
# on the fix PR goes green (status-rollup guarded).
#
# multica-server-specific deltas vs multica M4 ci-autofix:
#   - Setup: setup-go + pnpm + setup-node → install shell tooling
#     (shellcheck pre-installed; shfmt + yamllint + actionlint on demand).
#   - Install dependencies step: no-op (no app deps).
#   - Prompt rewrites: "Go server (Chi) + Next.js frontend" → "shell-only
#     infra repo". Common-failure list: Go panics / sqlc / pnpm → shell
#     syntax errors / shellcheck SC-codes / shfmt drift / actionlint /
#     yamllint.
#   - Test cmd: `cd server && go test` → run failing lint tool on changed
#     file (shellcheck / shfmt / actionlint / yamllint).
#   - Lint cmd: gofmt -w → shfmt -w -i 4 -bn -s.
#   - sqlc-generated rule → "do not mass-format / do not suppress lints
#     without justification".

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main'
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write

    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Extract failed run info
        id: failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          RUN_URL="https://github.com/$GH_REPO/actions/runs/$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

          LOGS=$(gh run view "$RUN_ID" --repo "$GH_REPO" --log-failed 2>&1 | tail -200)
          echo "$LOGS" > /tmp/failed-logs.txt

          ERROR_LINE=$(echo "$LOGS" | grep -E '(SC[0-9]+|error:|warning:|Error|Fatal|FATAL|syntax error)' | head -5)
          {
            echo "error_line<<EOFMARKER"
            echo "$ERROR_LINE"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if autofix commit or duplicate
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.failed.outputs.run_id }}
        run: |
          COMMIT_MSG=$(gh run view "$RUN_ID" --repo "$GH_REPO" --json headSha --jq '.headSha' | xargs -I{} gh api "repos/$GH_REPO/commits/{}" --jq '.commit.message')
          if echo "$COMMIT_MSG" | grep -q '\[ci-autofix\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OPEN_PR=$(gh pr list --repo "$GH_REPO" --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("ci-autofix"))][0].headRefName // empty')
          if [ -n "$OPEN_PR" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — open autofix PR already exists on branch $OPEN_PR"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram — started
        if: steps.guard.outputs.skip != 'true'
        env:
          ERROR_LINE: ${{ steps.failed.outputs.error_line }}
          RUN_URL: ${{ steps.failed.outputs.run_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SAFE_ERROR=$(printf '%s' "$ERROR_LINE" | head -c 300 | sed 's/[<>&]//g')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            --data-urlencode "text=🤖 <b>Claude CI Autofix (multica-server)</b> взял в работу

          <code>${SAFE_ERROR}</code>
          🔗 <a href=\"${RUN_URL}\">Failed run</a>"

      - name: Checkout code
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install shell tooling
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if ! command -v shfmt >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y shfmt
          fi
          if ! command -v yamllint >/dev/null 2>&1; then
            python3 -m pip install --user yamllint
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          cd /tmp
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Run Claude Code
        id: claude
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          allowed_bots: "github-actions,claude"
          prompt: |
            You are an automated CI fixer for **multica-server** — a shell-
            only infrastructure repository (bash scripts under scripts/,
            agent hooks, GitHub workflow YAML). No app code.

            ## Failed CI Run

            - **Workflow**: ${{ github.event.workflow_run.name }}
            - **Run URL**: ${{ steps.failed.outputs.run_url }}
            - **Error lines**:
            ```
            ${{ steps.failed.outputs.error_line }}
            ```

            ## Full failed logs (last 200 lines)

            Read `/tmp/failed-logs.txt` for the complete failed step output.

            ## Steps

            1. **Diagnose**: Read the error logs. Identify root cause.
               Common multica-server CI failures:
               - shellcheck SC-codes (unquoted vars, useless `cat`, redundant `;;`, etc.)
               - shfmt drift (indentation, binary op placement)
               - actionlint workflow YAML issues (missing perms, wrong syntax, shell inline issues)
               - yamllint syntax problems (key duplication, anchor cycles)
               - bash syntax errors in scripts/

            2. **Fix**: Minimal fix that resolves the failure.
               - Add quotes around unquoted variables (SC2086).
               - Use `[[ ]]` instead of `[ ]` for safety.
               - Add `set -euo pipefail` if missing in new scripts.
               - For workflow YAML: pass `github.event.X` via `env:` not inline.
               - Do NOT refactor unrelated scripts.

            3. **Test**: Verify the fix:
               - For *.sh: `shellcheck <file>` then `shfmt -d -i 4 -bn -s <file>` should be clean.
               - For .github/workflows/*.yml: `actionlint <file>` then `yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}, document-start: disable}}" <file>` should be clean.

            4. **Lint**: `shfmt -w -i 4 -bn -s <changed *.sh files>` to apply format.

            5. **PR**: Create a pull request:
               - Branch: `git checkout -b ci-autofix-$(date +%s)`
               - Title: `[no-ticket] fix(ci): <concise description>`
               - Body first line: `multica: ci-autofix follow-up to main-branch CI failure on <SHA>`
               - Body: link to failed run, root cause, what was fixed.
               - Label: `ci-autofix`
               - Commit message must contain `[ci-autofix]`

            6. **Report**: Write `/tmp/debug-report.txt`, EXACTLY 4 lines in Russian:
               Line 1: что сломалось
               Line 2: почему сломалось
               Line 3: что починили
               Line 4: затронутые файлы

               `printf '%s\n' 'line1' 'line2' 'line3' 'line4' > /tmp/debug-report.txt`

            ## Rules

            - Follow patterns from `config/claude/CLAUDE.md` + sibling scripts.
            - Do NOT modify unrelated files.
            - Do NOT mass-format (tech-debt cleanup is separate per docs/CI.md).
            - Do NOT add `# shellcheck disable=SC...` or `# yamllint disable-line` without a `# justification:` comment.
            - If root cause unclear with confidence, create PR as draft.

      - name: Auto-merge PR (with status-rollup guard)
        if: success() && steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.AGENT_PULSE_PAT }}
        run: |
          set -uo pipefail
          PR_URL=$(gh pr list --repo "$GH_REPO" --json url,headRefName --jq '[.[] | select(.headRefName | startswith("ci-autofix"))][0].url // empty')
          if [ -z "$PR_URL" ]; then exit 0; fi
          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          ROLLUP=$(gh pr view "$PR_NUM" --repo "$GH_REPO" --json statusCheckRollup --jq '.statusCheckRollup')
          FAILURES=$(echo "$ROLLUP" | jq -r '.[] | select(.conclusion == "FAILURE" or .conclusion == "CANCELLED" or .conclusion == "TIMED_OUT") | .name' || true)
          if [ -n "$FAILURES" ]; then
            echo "::error::Refusing to auto-merge ci-autofix PR — failing checks: $FAILURES"
            exit 0
          fi

          gh pr merge "$PR_URL" --auto --squash 2>&1 || echo "Auto-merge unavailable (branch protection may require approvals)"

      - name: Find PR URL
        id: pr
        if: success() && steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --repo "$GH_REPO" --json url,headRefName --jq '[.[] | select(.headRefName | startswith("ci-autofix"))][0].url // empty')
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Cleanup stale autofix branches
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_BRANCHES=$(gh pr list --repo "$GH_REPO" --state open --json headRefName --jq '.[].headRefName' 2>/dev/null || true)
          for BRANCH in $(git branch -r | grep 'origin/ci-autofix' | sed 's|origin/||'); do
            if ! echo "$OPEN_BRANCHES" | grep -q "^${BRANCH}$"; then
              if git push origin --delete "$BRANCH" 2>/dev/null; then
                echo "Deleted branch: $BRANCH"
              fi
            fi
          done

      - name: Extract debug report
        id: report
        if: success() && steps.guard.outputs.skip != 'true'
        run: |
          if [ -f /tmp/debug-report.txt ]; then
            SYMPTOM=$(sed -n '1p' /tmp/debug-report.txt)
            ROOT=$(sed -n '2p' /tmp/debug-report.txt)
            FIX=$(sed -n '3p' /tmp/debug-report.txt)
            FILES=$(sed -n '4p' /tmp/debug-report.txt)
          fi
          {
            echo "symptom=${SYMPTOM:-N/A}"
            echo "root=${ROOT:-N/A}"
            echo "fix=${FIX:-N/A}"
            echo "files=${FILES:-N/A}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Telegram — PR ready
        if: success() && steps.guard.outputs.skip != 'true' && steps.pr.outputs.url != ''
        env:
          REPORT_SYMPTOM: ${{ steps.report.outputs.symptom }}
          REPORT_ROOT: ${{ steps.report.outputs.root }}
          REPORT_FIX: ${{ steps.report.outputs.fix }}
          REPORT_FILES: ${{ steps.report.outputs.files }}
          PR_URL: ${{ steps.pr.outputs.url }}
          RUN_URL: ${{ steps.failed.outputs.run_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            --data-urlencode "text=✅ <b>Claude CI Autofix (multica-server)</b> — фикс готов!

          <b>━━━ Баг-репорт ━━━</b>
          🔴 <b>Что сломалось:</b> ${REPORT_SYMPTOM}
          🔍 <b>Почему:</b> ${REPORT_ROOT}
          🔧 <b>Что починили:</b> ${REPORT_FIX}
          📁 <b>Файлы:</b> ${REPORT_FILES}
          <b>━━━━━━━━━━━━━━━━━━━</b>

          🔗 PR: <a href=\"${PR_URL}\">${PR_URL}</a>
          🔗 Failed run: <a href=\"${RUN_URL}\">Actions</a>

          Auto-merge включён ✅"

      - name: Notify Telegram — no PR
        if: success() && steps.guard.outputs.skip != 'true' && steps.pr.outputs.url == ''
        env:
          RUN_URL: ${{ steps.failed.outputs.run_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            --data-urlencode "text=⚠️ <b>Claude CI Autofix (multica-server)</b> завершил работу, но PR не создан

          Проверь результат в <a href=\"${RUN_URL}\">Actions</a>"

      - name: Notify Telegram — failed
        if: failure() && steps.guard.outputs.skip != 'true'
        env:
          RUN_URL: ${{ steps.failed.outputs.run_url }}
          ERROR_LINE: ${{ steps.failed.outputs.error_line }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SAFE_ERROR=$(printf '%s' "$ERROR_LINE" | head -c 300 | sed 's/[<>&]//g')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            --data-urlencode "text=❌ <b>Claude CI Autofix (multica-server)</b> не смог пофиксить

          <code>${SAFE_ERROR}</code>

          Нужен ручной фикс. <a href=\"${RUN_URL}\">Failed run</a>"
