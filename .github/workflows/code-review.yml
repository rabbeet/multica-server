name: Claude Code Review

# Ported from rabbeet/multica (M2 @ 15d5d506) for the multica-server side of
# PUL-235 (S2, 2026-05-23). multica-server-specific deltas vs multica M2:
#   - Review focus rewritten for shell-only hardening (no Go, no Next.js):
#     POSIX-safety patterns (quoting, `set -euo pipefail`, no unquoted
#     globs, no eval), idempotency for bootstrap scripts, root-required
#     guards, shellcheck SC-class hot spots that reviewers commonly miss.
#   - allowedTools: `Bash(go:*),Bash(pnpm:*)` → `Bash(shellcheck:*),
#     Bash(shfmt:*),Bash(bash:*)`. No Go / pnpm tools — multica-server has
#     no app code.
#   - "gofmt + ESLint handle that" → "shfmt + shellcheck handle that"
#     (matches S1 ci.yml).
#   - PR-title shell-injection hardening from M2 applies here too (no
#     direct interpolation of github.event.pull_request.title).

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ci-autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'needs-human-review') &&
      !contains(github.event.pull_request.labels.*.name, 'claude-approved') &&
      !contains(github.event.pull_request.user.login, '[bot]') &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude,github-actions"
          additional_permissions: |
            actions: read
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Trigger event: ${{ github.event.action }}

            This is **multica-server** — an infra/bootstrap repo of shell scripts.
            No Go, no Next.js, no app code. Just `scripts/**/*.sh`,
            `agent/hooks/*.sh`, `.github/workflows/`, and docs.

            ## Step 1: Clean up your previous reviews (ONLY on subsequent pushes)

            If this is a `synchronize` event (not `opened`), check if the latest commit message contains `[auto-review-fix]`:
            ```bash
            LAST_MSG=$(git log -1 --pretty=format:"%s")
            echo "Last commit: $LAST_MSG"
            ```
            If it contains `[auto-review-fix]`, SKIP cleanup — these are fixes for your previous comments and you need them as context for re-review.

            Otherwise, clean up your previous review artifacts:

            1. **Read your previous reviews and comments** on this PR using `gh api` and `gh pr view`
            2. **Dismiss** your previous PR reviews via `gh api -X PUT repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/REVIEW_ID/dismissals`
            3. **Delete** your previous PR comments via `gh api -X DELETE repos/${{ github.repository }}/issues/comments/COMMENT_ID`
            4. **Minimize** your previous inline review comments as OUTDATED using the GraphQL `minimizeComment` mutation

            Match comments by your own username. Use `|| true` on each API call so one failure doesn't stop cleanup.
            Skip this step entirely if the trigger event is `opened`.

            ## Step 2: Determine review round

            Count fix-round labels on this PR:
            ```bash
            ROUND=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name | select(startswith("fix-round-"))] | length')
            echo "Current fix round: $ROUND"
            ```

            If ROUND >= 3: This PR has been through 3 fix attempts. Post a comment:
            "Review stopped: 3 fix rounds completed without resolution. Manual review needed."
            Then add `needs-human-review` label and STOP. Do NOT review further.

            ## Step 3: Review the PR

            Read the CLAUDE.md at the repo root for project conventions.
            Then review the PR diff. multica-server is shell-only, so focus narrows:

            1. **Shell safety** — top priority:
               - Missing `set -euo pipefail` at the top of new scripts
               - Unquoted variables that could be empty or contain spaces (`$VAR` vs `"$VAR"`)
               - Unquoted globs (`for f in $LIST; do …`)
               - `eval` of any kind — flag and require justification
               - `cd` without subshell or trap (state leak across functions)
               - Command substitution without quotes (`X=$(cmd)` then later `$X` unquoted)
               - `[ ... ]` vs `[[ ... ]]` consistency (use bash `[[` for safety)
               - Pipes that hide upstream failures (need `pipefail`)
            2. **Idempotency** — bootstrap scripts (`scripts/0[0-9]-*.sh`, `1[0-9]-*.sh`) must be safely re-runnable:
               - Already-exists checks (`if ! id -u multica ...`, `if [ ! -f ... ]`)
               - apt-get install lists filtered by `dpkg -s` (see `01-host-deps.sh` for the pattern)
               - systemd unit overrides via drop-in files, not editing main unit
            3. **Privilege boundary** — scripts that need root MUST guard via `require_root` (defined in `scripts/_lib.sh`):
               - `require_root` must be called BEFORE any state mutation
               - Scripts that don't need root must NOT silently elevate
            4. **External calls** — `curl` / `wget` / `git clone`:
               - Use HTTPS, not HTTP
               - For arbitrary downloads (`curl … | bash`), require checksum verification OR pin to a specific release tag (see `07-claude-cli.sh` for the precedent on `claude` binary install)
            5. **Logging** — use `log_info` / `log_warn` / `log_error` / `log_skip` from `scripts/_lib.sh`. Don't `echo` straight to stdout in scripts that are sourced or piped.
            6. **Workflow YAML** — for changes under `.github/workflows/`:
               - `github.event.X` fields must be passed via `env:` not interpolated into shell strings (M2/M4 PR-title shell-injection lesson)
               - secrets must not be interpolated into `curl URLs` directly — use `env:` env then `${VAR}`
               - new claude-action workflows must declare `id-token: write`, `contents: write/read`, `pull-requests: write` per the `_smoke-claude-action.yml` enforcement
            7. **CLAUDE.md governance** — if the PR changes `config/claude/CLAUDE.md`, verify the change matches existing tone (terse, references docs, no marketing voice).

            ## Verification Before Commenting

            Before posting ANY finding, verify it is real:
            1. Read the actual code, not just the diff. Check surrounding context (other helpers in `_lib.sh`, sibling scripts).
            2. Trace the logic to confirm the bug actually manifests.
            3. Drop it if unconfirmed. False positives waste reviewer time.

            ## Review Format

            - Use inline PR review comments on specific lines where possible
            - Severity: [critical], [warning], or [nit]
            - Be constructive — suggest fixes, not just problems
            - If the PR looks good, say so briefly. Do not invent issues.
            - Do NOT comment on formatting/style — shfmt + shellcheck handle that.
              (Pre-existing tech debt: shellcheck + shfmt are soft-checks in CI
              until cleanup PR ships. You may still flag NEW unquoted vars / new
              `set` violations in this PR's diff — that's correctness, not style.)

            ## Step 4: Post structured verdict

            After completing review, count your findings by severity. Then post a PR comment with this EXACT format:

            ```
            <!-- REVIEW_SUMMARY {"critical": N, "warning": N, "nit": N, "round": ROUND, "verdict": "VERDICT"} -->

            **Review Summary (Round ROUND/3):** N critical, N warning, N nits. Verdict: VERDICT_TEXT.
            ```

            Where VERDICT is one of:
            - `"needs_fix"` — at least one [critical] or [warning] finding
            - `"approved"` — no critical or warning findings (nits are OK)

            ROUND = current fix round + 1 (e.g., first review = Round 1/3).

            ## Step 5: Set labels based on verdict

            After posting the summary:

            If verdict is `needs_fix`:
            1. Calculate NEXT_ROUND from fix-round labels count + 1
            2. If NEXT_ROUND > 3: add label `needs-human-review`, do NOT add `claude-fix-needed`
            3. Else: add label `claude-fix-needed` and `fix-round-NEXT_ROUND`

            If verdict is `approved`:
            1. Add label `claude-approved`
            2. Remove `claude-fix-needed` label if present (use `|| true`)
            3. Remove all fix-round-* labels (use `|| true` for each)
            4. Post a review metrics summary comment on the PR.

            DO NOT MERGE THE PR. auto-merge-on-approval.yml (lands in S3) handles
            merge — gates on CI green + claude-approved label.

            Use `gh pr edit` to manage labels:
            ```bash
            gh pr edit ${{ github.event.pull_request.number }} --add-label "LABEL"
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "LABEL" || true
            ```
          claude_args: >-
            --model claude-opus-4-6
            --effort max
            --allowedTools
            "Read,Glob,Grep,
            Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr comment:*),
            Bash(gh pr edit:*),Bash(gh issue edit:*),
            Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),
            Bash(shellcheck:*),Bash(shfmt:*),Bash(bash:*),Bash(echo:*)"

      - name: Verify review verdict was posted
        if: always() && steps.review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --paginate --jq '[.[] | select(.body | test("REVIEW_SUMMARY"))] | length')
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name | select(. == "claude-fix-needed" or . == "claude-approved" or . == "needs-human-review")] | length')

          if [ "$SUMMARY" -eq 0 ] && [ "$LABELS" -eq 0 ]; then
            echo "No REVIEW_SUMMARY found and no labels set — fallback to needs-human-review"
            gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human-review" || true
            gh pr comment ${{ github.event.pull_request.number }} --body "Review completed but no structured verdict was produced. Manual review needed."
          fi

      - name: Notify Telegram on needs-human-review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HAS_LABEL=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name | select(. == "needs-human-review")] | length')
          if [ "$HAS_LABEL" -gt 0 ]; then
            PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
            PR_URL="${{ github.event.pull_request.html_url }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode=HTML \
              --data-urlencode "text=⚠️ <b>Code Review Loop (multica-server)</b> — 3 раунда исчерпаны

          PR: <a href=\"${PR_URL}\">#${{ github.event.pull_request.number }} ${PR_TITLE}</a>

          Нужен ручной разбор."
          fi

          HAS_APPROVED=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name | select(. == "claude-approved")] | length')
          if [ "$HAS_APPROVED" -gt 0 ]; then
            PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
            PR_URL="${{ github.event.pull_request.html_url }}"
            ROUND=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name | select(startswith("fix-round-"))] | length')
            if [ "$ROUND" -gt 0 ]; then
              ROUND_TEXT=" после ${ROUND} раунд(ов) фиксов"
            else
              ROUND_TEXT=""
            fi
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode=HTML \
              --data-urlencode "text=✅ <b>Code Review (multica-server)</b> — PR одобрен${ROUND_TEXT}

          PR: <a href=\"${PR_URL}\">#${{ github.event.pull_request.number }} ${PR_TITLE}</a>

          Auto-merge сработает после зелёного CI."
          fi
