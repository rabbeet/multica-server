# tinyproxy egress allowlist for agent-host container.
# Only allows outbound traffic to:
#   - Anthropic API (claude CLI)
#   - GitHub (git push, gh pr create)
#   - host.docker.internal (Pulse PG/Redis read-only)
#   - CH replica (PROD CH read-only via Tailscale)
#   - pg-agent-* (dev-PG sidecars on agent-net)
#
# Everything else is denied — defense in depth against prompt-injection-driven exfil.

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatHost "tinyproxy.stats"
StatFile "/usr/share/tinyproxy/stats.html"

LogLevel Notice

MaxClients 100
StartServers 5
MinSpareServers 5
MaxSpareServers 20
MaxRequestsPerChild 0

ViaProxyName "tinyproxy"

DisableViaHeader Yes

# Filter file: only allow listed hosts.
Filter "/etc/tinyproxy/filter"
FilterURLs Off
FilterDefaultDeny Yes
FilterCaseSensitive No
FilterExtended On

# CONNECT method — allow HTTPS to allowlisted hosts (filter applies to host portion).
ConnectPort 443
ConnectPort 8443
ConnectPort 22  # blocked separately by deny rules; explicitly listed for clarity
