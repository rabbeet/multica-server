# agent stack — A-lite: 1 always-on agent-host container + N dev-PG sidecars.
# Brought up by multica-server/scripts/06-agent-workers.sh.
# Lives on its own bridge network so it can be torn down independently of multica's selfhost compose.
#
# Design ref: ~/.gstack/projects/rabbeet-multica-server/rabbeeet-main-design-20260507-224221.md (A-lite)

name: multica-agent

networks:
  agent-net:
    driver: bridge

volumes:
  claude-agent-config: {}        # ALL N OAuth tokens persisted here

services:
  tinyproxy:
    image: vimagick/tinyproxy:latest
    container_name: agent-tinyproxy
    networks: [agent-net]
    volumes:
      - ./tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./tinyproxy-filter.txt:/etc/tinyproxy/filter:ro
    healthcheck:
      # Eng Issue 1.3 follow-up — tinyproxy down silently kills all egress.
      test: ["CMD-SHELL", "wget -q -O - --proxy=on -e use_proxy=yes -e http_proxy=http://localhost:8888 https://api.anthropic.com >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  agent-host:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-host
    networks: [agent-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tinyproxy:
        condition: service_healthy
    environment:
      # PROD live read-only access (P9 — CH via replica, hard limits enforced server-side)
      PULSE_PG_DSN: "postgres://pulse_agent_ro:${PULSE_AGENT_RO_PW}@host.docker.internal:5432/pulse?sslmode=disable"
      PULSE_CH_DSN: "https://agent_ro:${PULSE_AGENT_CH_PW}@${PULSE_CH_REPLICA_HOST}:8443/pulse"

      # Dev-PG sidecars — per-N (Outside-voice tension #5).
      DEV_PG_DSN: "postgres://pulse:dev_only@pg-agent-1:5432/pulse_dev"
      DEV_PG_HOSTS: "pg-agent-1,pg-agent-2"

      # Plans-repo write (audit log + plan amendment via /amend-plan).
      PLANS_REPO_HTTPS: "https://${AGENT_PLANS_PAT}@github.com/${PLANS_REPO_PATH}.git"
      PLANS_REPO_PATH: "${PLANS_REPO_PATH}"

      # Pulse bare-clone PAT (write feature branches; main pushes blocked by branch protection).
      PULSE_BARE_PAT: "${AGENT_PULSE_PAT}"
      MULTICA_REPO_PAT: "${AGENT_MULTICA_PAT}"

      # Egress proxy.
      HTTP_PROXY: "http://tinyproxy:8888"
      HTTPS_PROXY: "http://tinyproxy:8888"
      NO_PROXY: "localhost,127.0.0.1,host.docker.internal,pg-agent-1,pg-agent-2,${PULSE_CH_REPLICA_HOST}"

      # Telegram alerts (OAuth expiry, sidecar health).
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      # OAuth tokens for all N agents persist here.
      - claude-agent-config:/home/agent/.claude

      # Worktrees are persistent (survive container restart, but not host data loss).
      - /srv/agent-worktrees:/home/agent/worktrees

      # Bare clone (host, root-owned, group multica writable). Worktrees branch from here.
      - /srv/pulse-bare.git:/srv/pulse-bare.git

      # Read-only mirror via 13-context-clones — single source of truth for read.
      - /srv/pulse-code:/srv/pulse-code:ro
      - /srv/agent-context:/srv/agent-context:ro

      # Logs survive restart (Eng Issue 1.3).
      - /var/log/agent:/var/log/agent

      # Skills bundle — shared by all agents in this container.
      - ../skills:/home/agent/.claude/skills:ro

      # Agent-specific system context (NOT the brainstorm CLAUDE.md).
      - ./CLAUDE-agent.md:/home/agent/.claude/CLAUDE.md:ro
    deploy:
      resources:
        limits:
          memory: 4G            # 1 base + N * ~1G concurrent claude (3G ceiling at N=3 needs 6G — see 09-validate-resources)
          cpus: '4.0'
    healthcheck:
      test: ["CMD-SHELL", "claude --version >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  pg-agent-1:
    image: postgres:16
    container_name: pg-agent-1
    networks: [agent-net]
    environment:
      POSTGRES_DB: pulse_dev
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: dev_only_not_secret
    tmpfs:
      - /var/lib/postgresql/data       # ephemeral, drops on restart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  pg-agent-2:
    image: postgres:16
    container_name: pg-agent-2
    networks: [agent-net]
    environment:
      POSTGRES_DB: pulse_dev
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: dev_only_not_secret
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
